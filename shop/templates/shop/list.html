{% extends 'base.html' %}
{% block content %}
    <h1>Товары</h1>
    {% for product in products %}
        <div>
            <h3><a href="{{ product.id }}">{{ product.name }}</a></h3>
            <p>{{ product.description|truncatewords:10 }}</p>
            <strong>{{ product.price }} руб.</strong>
        </div>
    {% endfor %}
{% endblock %}
